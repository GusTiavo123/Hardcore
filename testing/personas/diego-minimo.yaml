# P5: Diego — "El perfil mínimo"
#
# No sabemos casi nada de Diego. Escribió una oración y nada más.
# Esto es realista — mucha gente quiere ir al grano y no quiere
# una entrevista de 15 minutos.
#
# El punto de este persona es testear:
# - Que el sistema no se rompe con datos mínimos
# - Que el status es "partial"
# - Que el fit scoring usa midpoints (10/20) para dims desconocidas
# - Que el flag "partial-fit-assessment" se activa

