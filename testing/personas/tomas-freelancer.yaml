# P1: Tomás — "El freelancer que quiere escapar del servicio"
#
# Quién es realmente:
# 32 años, Montevideo. Diseñador UX/UI freelance hace 6 años. Factura $4-5K/mes
# pero está quemado de clientes. Quiere un producto propio pero nunca programó.
# Tiene $20K ahorrados, vive austero. Solo, sin co-founder. 4.5K seguidores en
# Instagram sobre diseño UX LATAM. Conoce muchos freelancers (3-4 comunidades
# Slack/Discord). Impulsivo — se entusiasma y abandona. 2 side-projects muertos
# (app de tracking, marketplace de designers). No le interesa gobierno ni educación.
# Se cree aggressive pero es moderate.
#
# Lo que se le escapa al profiler (a menos que pregunte bien):
# - Los 2 proyectos abandonados
# - Que se cree aggressive pero es moderate
# - Que conoce a muchos freelancers (distribución latente)
# - Que las comunidades son canales de distribución

persona_id: "P1"
persona_name: "tomas-freelancer"
version: "1.0"

quick_mode_input: >
  Soy Tomás, diseñador UX freelance en Montevideo, 6 años de experiencia.
  Facturo bien pero estoy podrido de hacer servicios. Tengo 20K ahorrados
  y quiero armar un producto SaaS. No sé programar pero puedo diseñar todo
  y tengo contactos para tercerizar el dev. Tengo 4500 seguidores en Instagram
  sobre diseño UX. No me interesa nada con gobierno ni educación.

# What we expect the profiler to extract from the quick_mode_input above
# (not prescriptive — used for verification after the fact)
expected_extractions:
  should_capture:
    - "UX/UI design skills at expert level"
    - "Location: Montevideo, Uruguay"
    - "$20K capital available"
    - "Instagram audience: 4500, niche: UX design"
    - "Hard-nos: gobierno, educación"
    - "Cannot code — needs to outsource development"
    - "Wants to build SaaS"
  likely_misses:
    - "2 abandoned side-projects (not mentioned)"
    - "Risk tolerance mismatch — says nothing but is impulsive"
    - "Freelancer communities as distribution (implied but not explicit)"
    - "6 years freelancing = practitioner in service business ops"

