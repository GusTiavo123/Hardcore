# P4: Vale — "La serial entrepreneur con cicatrices"
#
# Quién es realmente:
# 41 años, Bogotá. 3 empresas: e-commerce de ropa (cerró, márgenes horribles),
# agencia de marketing digital (vendió por $80K), SaaS de redes sociales (murió
# en 8 meses por no validar). $60K del exit, full-time, quiere SaaS B2B.
# Network enorme en marketing digital y e-commerce LATAM (100+ dueños de
# negocios online). Sabe vender, operar, marketing. No programa. 8K followers
# en X sobre emprendimiento LATAM. Realista sobre riesgo. No quiere moda/ropa
# ni servicios (hard-nos de experiencia).
#
# Lo que se le escapa al profiler:
# - Lecciones específicas de cada venture (márgenes ropa, no validar)
# - Los 100+ contactos de dueños de negocios online (activables)
# - Hard-nos por experiencia (moda, servicios) vs los que dice explícitamente
# - Que el SaaS muerto es exactamente el contexto perfecto para usar Hardcore

persona_id: "P4"
persona_name: "vale-serial"
version: "1.0"

quick_mode_input: >
  Soy Vale, 41, Bogotá. Emprendí 3 veces: un e-commerce que cerré, una agencia
  de marketing que vendí, y un SaaS que fracasó porque no validé la idea.
  Tengo 60K, estoy full-time, y esta vez quiero hacer un SaaS B2B bien hecho.
  Sé vender y operar pero no programo. Tengo 8K seguidores en X hablando de
  emprendimiento y conozco a mucha gente en marketing digital y e-commerce en LATAM.

expected_extractions:
  should_capture:
    - "Serial entrepreneur — 3 ventures"
    - "Location: Bogotá, Colombia"
    - "$60K capital, full-time"
    - "Sales, operations, marketing skills"
    - "Cannot code"
    - "8K Twitter/X followers, entrepreneurship LATAM"
    - "Previous ventures with outcomes"
    - "Wants B2B SaaS"
  likely_misses:
    - "Specific lessons: margins on clothing are terrible, validate before building"
    - "100+ online business owners as activatable contacts (says 'mucha gente' but not quantified)"
    - "Hard-nos on fashion/clothing and services (experiential, not stated as hard-nos)"
    - "The failed SaaS = proof she needs validation tools like Hardcore"
    - "Agency exit at $80K = demonstrated ability to build and sell a business"

